<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>autobrowser options</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0b1020;
        color: #e6edf7;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }
      .card {
        width: min(720px, calc(100vw - 40px));
        padding: 24px;
        border-radius: 20px;
        background: #121a2f;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      label,
      input,
      button,
      p {
        display: block;
        width: 100%;
        box-sizing: border-box;
      }
      input {
        margin: 12px 0 18px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.04);
        color: inherit;
        padding: 12px 14px;
      }
      button {
        border: 0;
        border-radius: 999px;
        background: linear-gradient(90deg, #6ee7ff, #9b7bff);
        color: #0b1020;
        font-weight: 700;
        padding: 12px 18px;
        cursor: pointer;
      }
      p {
        color: #98a6c7;
        line-height: 1.6;
      }
      .diagnostics {
        white-space: pre-wrap;
        margin: 8px 0 0;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>autobrowser 设置</h1>
      <p>
        优先使用 connect page 自动保存 token 和 relay 端口；如果需要手动排查，也可以在这里直接改。
      </p>
      <label for="token">Token</label>
      <input id="token" autocomplete="off" spellcheck="false" placeholder="paste token here" />
      <label for="relay-port">Relay Port</label>
      <input id="relay-port" type="number" min="1" step="1" placeholder="47978" />
      <button id="save">Save</button>
      <p id="status">未保存</p>
      <div class="panel">
        <div class="label">Plugin diagnostics</div>
        <pre id="diagnostics" class="diagnostics">暂无诊断信息</pre>
      </div>
    </main>
    <script src="options.js"></script>
  </body>
</html>
